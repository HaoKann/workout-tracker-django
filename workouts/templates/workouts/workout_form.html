{% extends 'workouts/base.html' %}

{% block content %}

<div class="card">
    <h2>Новая тренировка</h2>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" style="padding: 10px 15px; background: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px;">
            Сохранить тренировку
        </button>
    </form>

    <br>
    <a href="{% url 'workout_list' %}" style="color: #7f8c8d; text-decoration: none; font-size: 0.9em;">Назад к списку</a>
</div>

{% endblock %}
