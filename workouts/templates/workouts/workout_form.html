{% extends 'workouts/base.html' %}
{% load static %}

{% block content %}

<div class="wf-card">
    <div class="wf-header">
        <p class="wf-eyebrow">Добавление</p>
        <h2 class="wf-title">Новая <span>тренировка</span></h2>
    </div>

    <form method="post" enctype="multipart/form-data" class="wf-form">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="wf-submit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Сохранить тренировку
        </button>
    </form>

    <div style="padding: 0 36px 32px;">
        <a href="{% url 'workout_list' %}" style="color: #64748B; text-decoration: none; font-size: 14px;">← Назад к списку</a>
    </div>
</div>

{% endblock %}
