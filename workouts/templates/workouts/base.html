{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <link rel="stylesheet" href="{% static 'workouts/css/style.css' %}">
</head>
<body>


    <div style="max-width: 800px; margin: 0 auto;">
        {% if messages %}
            <ul style="list-style: none; margin: 0 auto;">
                {% for message in messages %}
                    <li style="padding: 10px; margin-bottom: 15px; border-radius: 4px; background-color: #dffece; color: #2e6615; border: 1px solid #b8dfa3;">
                       {{ message }}  
                    </li>
                {% endfor %}
            </ul>
        {% endif %}

        {% block content %}
        <!-- Сюда попадает уникальный контент каждой страницы -->
        {% endblock %}
    </div>


</body>
</html>
